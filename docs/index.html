<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GitHub Repository Traffic Viewer</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🔷</text></svg>">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="GitHub Repository Traffic Viewer">
    <meta property="og:description" content="A handy tool to view your own GitHub repository traffic statistics">
    <meta property="og:image" content="https://metatronslove.github.io/og-image.png">
    <meta property="og:url" content="https://metatronslove.github.io/">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Chart.js 3.9.1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles/style.css">
    <script data-name="BMC-Widget" 
        data-cfasync="false" 
        src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" 
        data-id="metatronslove" 
        data-description="Support me on Buy me a coffee!" 
        data-message="Like my projects? Buy me a coffee!" 
        data-color="#FFDD00" 
        data-position="right" 
        data-x_margin="18" 
        data-y_margin="18">
    </script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/highlight.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="language-switcher">
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" onclick="changeLanguage('tr')">TR</button>
            <button class="lang-btn theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <div class="controls-wrapper">
            <div class="time-range-selector" id="time-range-container" style="display:none;">
                <label data-translate="timeRange"> Time Range: <select id="time-range">
                        <option value="1d">Last Day</option>
                        <option value="7d">Last Week</option>
                        <option value="30d" selected>Last Month</option>
                        <option value="90d">Last 3 Months</option>
                        <option value="180d">Last 6 Months</option>
                        <option value="365d">Last Year</option>
                        <option value="all">All Time</option>
                    </select>
                </label>
            </div>
            <div class="per-page-selector" id="per-page-container" style="display:none;">
                <label data-translate="perPage">
                    <select id="per-page">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </label>
            </div>
        </div>
        
        <h1 data-translate="title">GitHub Repository Traffic Stats</h1>
        <div id="info-container"></div>
        <div id="loading">Checking GitHub session...</div>
        <div id="charts-container"></div>
        <div class="pagination" id="pagination" style="display:none;"></div>
        
        <!-- Footer - maviveyasemin.php tasarımıyla -->
        <footer class="premium-footer" style="
            transform: rotateZ(270deg);
			position: fixed;
			bottom: 240px;
			left: -215px;">
            <div class="footer-glass" style="display: inline-block;">
                <div class="tech-stack">
                    <i class="fab fa-html5"></i>
                    <i class="fab fa-css3-alt"></i>
                    <i class="fab fa-js"></i>
                    <a href="https://linktr.ee/metatronslove" target="_blank" class="social-card linktree">
                        <i class="fas fa-tree"></i>
                        <span>linktr.ee</span>
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="https://buymeacoffee.com/metatronslove" target="_blank" class="social-card coffee">
                        <i class="fas fa-mug-hot"></i>
                        <span>Buy Me a Coffee</span>
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="https://youtube.com/@metatronslove" target="_blank" class="social-card youtube">
                        <i class="fab fa-youtube"></i>
                        <span>YouTube</span>
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="https://one.fanclub.rocks/" target="_blank" class="social-card blog">
                        <i class="fas fa-blog"></i>
                        <span>One Blog</span>
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
             </div>
        </footer>
    </div>
    
    <script src="scripts/script.js"></script>
</body>

</html>
